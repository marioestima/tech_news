<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6C3EF8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="styles/styles.css" />
    <title>Tech News Daily</title>
  </head>
  <body>
    <nav class="nav">
      <div class="nav__container">
        <div class="nav__logo"><i class="bi bi-newspaper"></i></div>
        <div class="nav__title"><h1>Tech News Daily</h1></div>
      </div>
    </nav>

    <main class="container">
      <section class="update-card" onclick="fetchNews()">
        <i class="bi bi-arrow-clockwise"></i>
        <p>Atualizar Notícias</p>
      </section>

      <section class="notices__section">
        <div class="notices__cards_grid" id="news-grid"></div>
      </section>
    </main>

    <div id="modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <button class="btn-pdf" onclick="exportPDF()">
            <i class="bi bi-file-earmark-pdf"></i> PDF
          </button>
          <i class="bi bi-x-lg close" onclick="closeModal()"></i>
        </div>
        <h2 id="modal-title"></h2>
        <div id="modal-body">
          <p id="modal-content"></p>
        </div>
      </div>
    </div>
    
    <div id="google_translate_element" style="display: none"></div>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "pt",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          },
          "google_translate_element"
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
